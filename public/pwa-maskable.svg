<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Solid background — wine variant, bleeds to edges for maskable -->
  <rect width="512" height="512" fill="#5A1E1C"/>

  <!--
    Book logo scaled to fit maskable safe zone (inner 80% = 410×410, center 256,256).
    Original geometry: viewBox "0 35.5 200 200" → 200×200 content area.
    Scale factor: 410/200 = 2.05. Center offset: 256 - 100*2.05 = 51
    translate(51, 51 - 35.5*2.05) then scale(2.05)
    = translate(51, -21.775) scale(2.05)
    Simplify: transform="translate(256,256) scale(2.05) translate(-100,-135.5)"
  -->
  <g transform="translate(256,256) scale(2.05) translate(-100,-135.5)">
    <!-- Pages: 11 folhas em leque, paleta vinho (escura → clara, esq → dir) -->
    <g transform="rotate(-68, 100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#5C2220"/></g>
    <g transform="rotate(-60, 100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#682826"/></g>
    <g transform="rotate(-52, 100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#742F2D"/></g>
    <g transform="rotate(-44, 100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#7F3A37"/></g>
    <g transform="rotate(-36, 100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#8A4140"/></g>
    <g transform="rotate(-28, 100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#954A48"/></g>
    <g transform="rotate(-20, 100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#A05452"/></g>
    <g transform="rotate(-12, 100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#AB5E5C"/></g>
    <g transform="rotate(-4,  100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#B66967"/></g>
    <g transform="rotate(4,   100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#C17472"/></g>
    <g transform="rotate(12,  100, 146)"><polygon points="97,146 103,146 111,56 89,56" fill="#CB7F7E"/></g>

    <!-- Letra "r": haste + arco — creme -->
    <line x1="100" y1="146" x2="100" y2="215" stroke="#F5F0E8" stroke-width="13" stroke-linecap="round"/>
    <path d="M 100,161 C 100,149 129,148 134,163" stroke="#F5F0E8" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
